<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 포켓몬 뽑기</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    body { font-family: 'DungGeunMo', sans-serif; letter-spacing: 1px; }
    .gb-box {
      background-color: white; border: 4px solid black; border-radius: 12px;
      box-shadow: inset 0 0 0 3px white, inset 0 0 0 6px black; padding: 16px 20px;
    }
    .gb-box-small {
      background-color: white; border: 4px solid black; border-radius: 8px;
      box-shadow: inset 0 0 0 2px white, inset 0 0 0 4px black; padding: 12px 16px;
    }
    .pixelated { image-rendering: pixelated; }
    .bg-pattern {
      background-color: #A0B0E0;
      background-image: 
        linear-gradient(45deg, #98A8D8 25%, transparent 25%, transparent 75%, #98A8D8 75%, #98A8D8),
        linear-gradient(45deg, #98A8D8 25%, transparent 25%, transparent 75%, #98A8D8 75%, #98A8D8);
      background-size: 32px 32px; background-position: 0 0, 16px 16px;
    }
    .cursor-blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .shiny-bg { animation: shinyFlash 1s ease-in-out; }
    @keyframes shinyFlash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.5) hue-rotate(30deg); }
      100% { filter: brightness(1); }
    }
  </style>
</head>
<body class="w-full h-screen bg-[#687890] flex flex-col items-center justify-center p-2 select-none overflow-hidden text-black">

  <div id="app-container" class="relative w-full max-w-md h-full max-h-[500px] bg-pattern border-8 border-gray-900 rounded-lg shadow-2xl flex flex-col items-center justify-between py-4 box-border">
    
    <!-- 상단 영역 -->
    <div class="flex-1 w-full flex items-center justify-center relative z-10">
      <div id="start-btn" class="gb-box flex flex-col gap-4 text-xl sm:text-2xl cursor-pointer hover:bg-gray-100 transition-colors animate-pulse" onclick="handleStart()">
        <div class="flex items-center gap-2"><span>▶ 뽑기 시작</span></div>
      </div>

      <!-- 포켓몬 표시 영역 -->
      <div id="pokemon-display" class="hidden flex-col items-center animate-bounce">
        <div class="relative flex justify-center items-center w-48 h-48">
          <span id="shiny-sparkle" class="hidden absolute -top-4 right-0 text-3xl animate-ping z-20">✨</span>
          
          <!-- 이미지 태그에 불필요한 속성을 모두 제거하고 JS에서 안전하게 통제합니다 -->
          <img id="pokemon-img" alt="pokemon" class="hidden z-10">
          <div id="question-mark" class="hidden text-5xl font-bold z-10">?</div>
        </div>
      </div>
    </div>

    <!-- 예/아니오 선택 창 -->
    <div id="yes-no-box" class="hidden absolute right-4 bottom-[120px] sm:bottom-[130px] gb-box-small flex-col gap-2 z-40 text-lg sm:text-xl">
      <div class="flex items-center gap-2 cursor-pointer" onmouseenter="setCursor('yes')" onclick="handleDrawAgain()">
        <span id="cursor-yes" class="visible">▶</span><span>예</span>
      </div>
      <div class="flex items-center gap-2 cursor-pointer" onmouseenter="setCursor('no')" onclick="handleQuit()">
        <span id="cursor-no" class="invisible">▶</span><span>아니오</span>
      </div>
    </div>

    <!-- 하단 대화창 -->
    <div class="w-[92%] mb-1 relative z-20">
      <div id="name-tag" class="hidden absolute -top-8 left-0 gb-box !py-1 !px-3 z-30">
        <span class="text-base sm:text-lg">안내원</span>
      </div>

      <div id="dialogue-box" class="gb-box w-full h-[100px] sm:h-[120px] text-lg sm:text-xl leading-relaxed whitespace-pre-wrap relative cursor-pointer flex flex-col justify-center" onclick="handleNextDialogue()">
        <p id="dialogue-text">랜덤 포켓몬 뽑기 기계다!<br>작동시킬까?</p>
        <p id="loading-text" class="hidden absolute top-4 left-4 text-sm">통신 중입니다...</p>
      </div>
    </div>
  </div>

  <div class="mt-2 text-center text-[10px] sm:text-xs text-white/70">
    <p>비상업적 팬 프로젝트입니다. (Data: Local static dataset / Sprites: Custom pixel art)</p>
    <p>© Nintendo, Creatures, GAME FREAK, TV Tokyo, ShoPro, JR Kikaku. © Pokémon.</p>
  </div>

  <script>
    let POKEMON_DATA = [];
    let dataLoaded = false;
    let step = 0;
    let pokemon = null;
    let isLoading = false;
    let typeWriterTimer = null;
    let currentCursor = 'yes';
    const introText = `오늘의 포켓몬은 뭘까요~?\n피핏카츄!`;
    const SHINY_RATE = 4096;
    const IMAGE_BASE_PATH = './images';

    async function loadPokemonData() {
      if (dataLoaded) return;
      const response = await fetch('./data/pokemon-final-with-forms.json');
      if (!response.ok) throw new Error('Failed to load pokemon data');
      POKEMON_DATA = await response.json();
      dataLoaded = true;
    }

    const appContainer = document.getElementById('app-container');
    const startBtn = document.getElementById('start-btn');
    const pokemonDisplay = document.getElementById('pokemon-display');
    const pokemonImg = document.getElementById('pokemon-img');
    const questionMark = document.getElementById('question-mark');
    const shinySparkle = document.getElementById('shiny-sparkle');
    const yesNoBox = document.getElementById('yes-no-box');
    const cursorYes = document.getElementById('cursor-yes');
    const cursorNo = document.getElementById('cursor-no');
    const nameTag = document.getElementById('name-tag');
    const dialogueText = document.getElementById('dialogue-text');
    const loadingText = document.getElementById('loading-text');

    function isSpecialEncounterName(pokemon) {
      if (!pokemon) return false;
      const slug = String(pokemon.slug || '').toLowerCase();
      return slug.startsWith('mega-') || slug.includes('-gigantamax');
    }

    function getEncounterPrefix(pokemon) {
      return isSpecialEncounterName(pokemon) ? '앗! ' : '앗! 야생의 ';
    }

    function buildImageCandidates(entry, isShiny) {
      const slug = entry.slug;
      const dex = String(entry.dexId).padStart(4, '0');
      const folder = isShiny ? 'shiny' : 'normal';
      return [
        `${IMAGE_BASE_PATH}/${folder}/${slug}.webp`,
        `${IMAGE_BASE_PATH}/${folder}/${slug}.png`,
        `${IMAGE_BASE_PATH}/${folder}/${dex}-${slug}.webp`,
        `${IMAGE_BASE_PATH}/${folder}/${dex}-${slug}.png`,
        `${IMAGE_BASE_PATH}/${folder}/${dex}.webp`,
        `${IMAGE_BASE_PATH}/${folder}/${dex}.png`,
        `${IMAGE_BASE_PATH}/${slug}.webp`,
        `${IMAGE_BASE_PATH}/${slug}.png`,
        `${IMAGE_BASE_PATH}/${dex}-${slug}.webp`,
        `${IMAGE_BASE_PATH}/${dex}-${slug}.png`,
        `${IMAGE_BASE_PATH}/${dex}.webp`,
        `${IMAGE_BASE_PATH}/${dex}.png`
      ];
    }

    async function fetchRandomPokemon() {
      isLoading = true;
      updateLoadingUI();
      try {
        const randomIndex = Math.floor(Math.random() * POKEMON_DATA.length);
        const entry = POKEMON_DATA[randomIndex];
        const isShiny = Math.floor(Math.random() * SHINY_RATE) === 0;
        pokemon = {
          id: entry.dexId,
          dexId: entry.dexId,
          slug: entry.slug,
          name: entry.ko || entry.en,
          en: entry.en,
          ko: entry.ko,
          category: entry.category,
          isForm: entry.is_form,
          isShiny,
          imageCandidates: buildImageCandidates(entry, isShiny)
        };
      } catch (error) {
        pokemon = { id: 0, dexId: 0, slug: 'missingno', name: '미싱노', en: 'MissingNo.', ko: '미싱노', category: 'base', isForm: false, isShiny: false, imageCandidates: [] };
      } finally {
        isLoading = false;
        updateLoadingUI();
      }
    }

    async function handleStart() {
      if (!dataLoaded) {
        loadingText.classList.remove('hidden');
        try {
          await loadPokemonData();
        } catch (error) {
          loadingText.classList.add('hidden');
          dialogueText.innerHTML = '포켓몬 데이터를 불러오지 못했습니다.<br>파일 경로를 확인해주세요.';
          return;
        }
        loadingText.classList.add('hidden');
      }

      step = 1;
      pokemon = null;
      clearInterval(typeWriterTimer);

      startBtn.classList.add('hidden');
      pokemonDisplay.classList.add('hidden');
      pokemonImg.classList.add('hidden');
      pokemonImg.removeAttribute('src');
      questionMark.classList.add('hidden');
      yesNoBox.classList.add('hidden');
      nameTag.classList.remove('hidden');
      appContainer.classList.remove('shiny-bg');

      let currentIndex = 0;
      dialogueText.innerHTML = '';

      typeWriterTimer = setInterval(() => {
        dialogueText.innerHTML = introText.slice(0, currentIndex + 1) + '<span class="opacity-0">▼</span>';
        currentIndex++;

        if (currentIndex >= introText.length) {
          clearInterval(typeWriterTimer);
          setTimeout(() => {
            step = 2;
            showPokemonResult();
          }, 1200);
        }
      }, 120);

      fetchRandomPokemon();
    }

    function loadImageSequentially(candidates, onSuccess, onFail) {
      const list = Array.isArray(candidates) ? [...new Set(candidates.filter(Boolean))] : [];
      if (!list.length) {
        onFail();
        return;
      }
      const tryIndex = (index) => {
        if (index >= list.length) {
          onFail();
          return;
        }
        const img = new Image();
        img.onload = () => onSuccess(img.src, index === 0);
        img.onerror = () => tryIndex(index + 1);
        img.src = list[index];
      };
      tryIndex(0);
    }

    function showPokemonResult() {
      if (!pokemon) return;

      pokemonDisplay.classList.remove('hidden');
      pokemonDisplay.classList.add('flex');
      pokemonImg.classList.add('hidden');
      questionMark.classList.add('hidden');

      loadImageSequentially(
        pokemon.imageCandidates,
        (src, usedPrimary) => {
          pokemonImg.src = src;
          pokemonImg.className = usedPrimary
            ? 'w-40 h-40 sm:w-48 sm:h-48 pixelated drop-shadow-lg scale-125 sm:scale-150'
            : 'w-40 h-40 sm:w-48 sm:h-48 pixelated drop-shadow-lg scale-110 sm:scale-125';
          pokemonImg.classList.remove('hidden');
        },
        () => {
          questionMark.classList.remove('hidden');
        }
      );

      const encounterPrefix = getEncounterPrefix(pokemon);

      if (pokemon.isShiny) {
        shinySparkle.classList.remove('hidden');
        appContainer.classList.add('shiny-bg');
        dialogueText.innerHTML = `${encounterPrefix}<strong class="text-yellow-600">색이다른 ${pokemon.name}</strong>(이)가<br>나타났다! <span class="cursor-blink text-red-600">▼</span>`;
      } else {
        shinySparkle.classList.add('hidden');
        dialogueText.innerHTML = `${encounterPrefix}<strong class="text-red-600">${pokemon.name}</strong>(이)가<br>나타났다! <span class="cursor-blink text-red-600">▼</span>`;
      }
    }

    function handleNextDialogue() {
      if (step === 2) {
        step = 3;
        yesNoBox.classList.remove('hidden');
        yesNoBox.classList.add('flex');
        setCursor('yes');
        dialogueText.innerHTML = `다시 한 번 뽑으시겠습니까?`;
      } else if (step === 4) {
        step = 0;
        nameTag.classList.add('hidden');
        pokemonDisplay.classList.add('hidden');
        startBtn.classList.remove('hidden');
        dialogueText.innerHTML = `랜덤 포켓몬 뽑기 기계다!<br>작동시킬까?`;
      }
    }

    function handleDrawAgain() { handleStart(); }

    function handleQuit() {
      step = 4;
      yesNoBox.classList.add('hidden');
      yesNoBox.classList.remove('flex');
      pokemonDisplay.classList.add('hidden');
      appContainer.classList.remove('shiny-bg');
      dialogueText.innerHTML = `이용해 주셔서 감사합니다!<br>다음에 또 만나요! <span class="cursor-blink text-red-600">▼</span>`;
    }

    function setCursor(type) {
      currentCursor = type;
      if (type === 'yes') {
        cursorYes.className = 'visible'; cursorNo.className = 'invisible';
      } else {
        cursorYes.className = 'invisible'; cursorNo.className = 'visible';
      }
    }

    function updateLoadingUI() {
      if ((step === 2 || step === 3) && isLoading) loadingText.classList.remove('hidden');
      else loadingText.classList.add('hidden');
    }
  </script>
</body>
</html>
